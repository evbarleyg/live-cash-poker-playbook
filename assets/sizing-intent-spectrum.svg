<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sizing Intent Spectrum</title>
  <desc id="desc">Sizing tells often reveal whether the bet wants a call or a fold.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F4EC"/>
      <stop offset="100%" stop-color="#EFE3D2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#5C4634" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 44px Georgia, serif; fill: #172033; }
      .subtitle { font: 400 21px Avenir, Helvetica, Arial, sans-serif; fill: #5F6C7B; }
      .eyebrow { font: 800 15px Avenir, Helvetica, Arial, sans-serif; letter-spacing: 2px; fill: #79351D; }
      .label { font: 700 24px Avenir, Helvetica, Arial, sans-serif; fill: #172033; }
      .small { font: 500 17px Avenir, Helvetica, Arial, sans-serif; fill: #5F6C7B; }
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1045" cy="110" r="135" fill="#E8F2F5" opacity="0.9"/>
  <circle cx="110" cy="650" r="170" fill="#F0D7B0" opacity="0.46"/>
  <text x="70" y="82" class="eyebrow">LIVE CASH POKER PLAYBOOK</text>
  <text x="70" y="138" class="title">Sizing Intent Spectrum</text>
  <text x="72" y="178" class="subtitle">Sizing tells often reveal whether the bet wants a call or a fold.</text>
  <g filter="url(#shadow)">
    <rect x="150" y="260" width="900" height="56" rx="18" fill="#FFFFFF" stroke="#D8CFC2"/>
    <text x="180" y="297" class="label">Block</text>
    <text x="1022" y="296" text-anchor="end" class="small">Step 1</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="202" y="332" width="795" height="56" rx="18" fill="#E8F2F5" stroke="#D8CFC2"/>
    <text x="232" y="369" class="label">Probe</text>
    <text x="969" y="368" text-anchor="end" class="small">Step 2</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="254" y="404" width="690" height="56" rx="18" fill="#FFFFFF" stroke="#D8CFC2"/>
    <text x="284" y="441" class="label">Value</text>
    <text x="916" y="440" text-anchor="end" class="small">Step 3</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="306" y="476" width="585" height="56" rx="18" fill="#E8F2F5" stroke="#D8CFC2"/>
    <text x="336" y="513" class="label">Polar</text>
    <text x="863" y="512" text-anchor="end" class="small">Step 4</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="358" y="548" width="480" height="56" rx="18" fill="#FFFFFF" stroke="#D8CFC2"/>
    <text x="388" y="585" class="label">Panic</text>
    <text x="810" y="584" text-anchor="end" class="small">Step 5</text>
  </g>
  <path d="M 975 285 C 1040 360, 1040 455, 905 585" fill="none" stroke="#B4532A" stroke-width="7" stroke-linecap="round"/>
  <text x="600" y="650" text-anchor="middle" class="small">Narrow the decision until the profitable default is obvious.</text>
</svg>
