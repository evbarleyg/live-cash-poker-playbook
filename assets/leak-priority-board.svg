<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Leak Priority Board</title>
  <desc id="desc">Fix the leaks that are frequent, costly, and easy to recognize.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F4EC"/>
      <stop offset="100%" stop-color="#EFE3D2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#5C4634" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 44px Georgia, serif; fill: #172033; }
      .subtitle { font: 400 21px Avenir, Helvetica, Arial, sans-serif; fill: #5F6C7B; }
      .eyebrow { font: 800 15px Avenir, Helvetica, Arial, sans-serif; letter-spacing: 2px; fill: #79351D; }
      .label { font: 700 24px Avenir, Helvetica, Arial, sans-serif; fill: #172033; }
      .small { font: 500 17px Avenir, Helvetica, Arial, sans-serif; fill: #5F6C7B; }
    </style>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1045" cy="110" r="135" fill="#E8F2F5" opacity="0.9"/>
  <circle cx="110" cy="650" r="170" fill="#F0D7B0" opacity="0.46"/>
  <text x="70" y="82" class="eyebrow">LIVE CASH POKER PLAYBOOK</text>
  <text x="70" y="138" class="title">Leak Priority Board</text>
  <text x="72" y="178" class="subtitle">Fix the leaks that are frequent, costly, and easy to recognize.</text>
  <g filter="url(#shadow)">
    <rect x="160" y="280" width="425" height="130" rx="24" fill="#FFFFFF" stroke="#D8CFC2"/>
    <text x="188" y="330" class="label">Frequency</text>
    <text x="188" y="364" class="small">High frequency, high clarity.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="615" y="280" width="425" height="130" rx="24" fill="#E8F2F5" stroke="#D8CFC2"/>
    <text x="643" y="330" class="label">Cost</text>
    <text x="643" y="364" class="small">Profitable when player type confirms.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="160" y="455" width="425" height="130" rx="24" fill="#FFF7E8" stroke="#D8CFC2"/>
    <text x="188" y="505" class="label">Confidence</text>
    <text x="188" y="539" class="small">Tempting, but needs proof.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="615" y="455" width="425" height="130" rx="24" fill="#FFFFFF" stroke="#D8CFC2"/>
    <text x="643" y="505" class="label">Next drill</text>
    <text x="643" y="539" class="small">Usually noise until repeated.</text>
  </g>
  <line x1="600" y1="255" x2="600" y2="610" stroke="#D8CFC2" stroke-width="2" stroke-dasharray="8 9"/>
  <line x1="125" y1="435" x2="1075" y2="435" stroke="#D8CFC2" stroke-width="2" stroke-dasharray="8 9"/>
</svg>
